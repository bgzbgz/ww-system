openapi: 3.0.3
info:
  title: Boss Office Webhook Receiver API
  description: Receive QA-approved tools from n8n Boss Office Storage workflow
  version: 1.0.0
  contact:
    name: Boss Office Admin
    email: boss@fasttrack.com

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.fasttrack.com
    description: Production server

paths:
  /api/boss/webhooks/tool-ready:
    post:
      summary: Receive QA-approved tool
      description: |
        Webhook endpoint called by n8n Boss Office Storage workflow when a tool has been
        generated by Worker and approved by QA Department. Stores the tool in MongoDB
        with status "pending_review" for Boss to review.

        This endpoint is idempotent - calling it multiple times with the same tool_id
        will not create duplicates (enforced by MongoDB unique index).
      operationId: receiveQAApprovedTool
      tags:
        - Webhooks
      security:
        - WebhookSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tool_id
                - generated_html
                - qa_score
              properties:
                tool_id:
                  type: string
                  pattern: ^tool_[a-z0-9]{3,}$
                  example: "tool_001"
                  description: Unique tool identifier
                tool_purpose:
                  type: string
                  maxLength: 200
                  example: "Budget Calculator"
                  description: What the tool does
                client_name:
                  type: string
                  maxLength: 100
                  example: "Acme Corp"
                  description: Who the tool is for
                document_type:
                  type: string
                  enum: [txt, md, pdf, docx]
                  example: "docx"
                  description: Source document file type
                source_document:
                  type: string
                  example: "Know thyself is the first step..."
                  description: Extracted text from source document
                generated_html:
                  type: string
                  example: "<!DOCTYPE html><html>...</html>"
                  description: Generated single-file HTML tool
                qa_score:
                  type: number
                  minimum: 0
                  maximum: 100
                  example: 92
                  description: QA compliance score (0-100)
                qa_feedback:
                  type: string
                  example: "Excellent quality. Follows Fast Track brand guidelines perfectly."
                  description: QA department comments
            example:
              tool_id: "tool_001"
              tool_purpose: "Know Thyself Self-Discovery Tool"
              client_name: "Fast Track Participants"
              document_type: "docx"
              source_document: "Know thyself is the first step to mastering your energy..."
              generated_html: "<!DOCTYPE html><html lang=\"en\"><head>...</head><body>...</body></html>"
              qa_score: 92
              qa_feedback: "Excellent quality. Bold typography, clear black/white/yellow color scheme."
      responses:
        '200':
          description: Tool stored successfully in MongoDB
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - tool_id
                  - status
                  - stored_at
                properties:
                  success:
                    type: boolean
                    example: true
                  tool_id:
                    type: string
                    example: "tool_001"
                  status:
                    type: string
                    enum: [pending_review]
                    example: "pending_review"
                    description: Tool is now pending Boss review
                  stored_at:
                    type: string
                    format: date-time
                    example: "2026-01-22T10:35:12.456Z"
                    description: When tool was stored in MongoDB
              example:
                success: true
                tool_id: "tool_001"
                status: "pending_review"
                stored_at: "2026-01-22T10:35:12.456Z"
        '400':
          description: Bad request - Invalid payload or missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFields:
                  summary: Missing required fields
                  value:
                    error: "VALIDATION_ERROR"
                    message: "Missing required fields: tool_id, generated_html, qa_score"
                invalidToolId:
                  summary: Invalid tool_id format
                  value:
                    error: "VALIDATION_ERROR"
                    message: "Invalid tool_id format. Expected: tool_xxx"
                invalidQaScore:
                  summary: Invalid QA score
                  value:
                    error: "VALIDATION_ERROR"
                    message: "qa_score must be 0-100"
        '401':
          description: Unauthorized - Invalid or missing webhook secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "UNAUTHORIZED"
                message: "Invalid webhook secret"
        '409':
          description: Conflict - tool_id already exists in MongoDB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "CONFLICT"
                message: "Tool with tool_id 'tool_001' already exists"
        '500':
          description: Internal server error - MongoDB operation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "DATABASE_ERROR"
                message: "Failed to store tool in MongoDB: Connection timeout"

components:
  securitySchemes:
    WebhookSecret:
      type: apiKey
      in: header
      name: X-Webhook-Secret
      description: Shared secret for validating n8n webhook requests

  schemas:
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          description: Additional error details (optional)
